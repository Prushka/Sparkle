<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#08090d" />
		<title>Sparkle Offline</title>
		<style>
			:root {
				color-scheme: dark;
				font-family:
					Nunito,
					ui-sans-serif,
					system-ui,
					-apple-system,
					BlinkMacSystemFont,
					'Segoe UI',
					sans-serif;
				background: #08090d;
				color: #f7f7fb;
			}

			body {
				display: grid;
				min-height: 100dvh;
				margin: 0;
				place-items: center;
				padding: 24px;
				background:
					radial-gradient(circle at 50% 0%, rgba(255, 153, 190, 0.18), transparent 36rem), #08090d;
			}

			main {
				max-width: 30rem;
				text-align: center;
			}

			img {
				width: 92px;
				height: 92px;
			}

			h1 {
				margin: 24px 0 8px;
				font-size: 1.75rem;
				line-height: 1.1;
			}

			p {
				margin: 0;
				color: #c9c9d4;
				font-size: 1rem;
				line-height: 1.6;
			}

			button {
				margin-top: 24px;
				border: 1px solid rgba(255, 255, 255, 0.16);
				border-radius: 8px;
				background: rgba(255, 255, 255, 0.08);
				color: inherit;
				cursor: pointer;
				font: inherit;
				padding: 10px 14px;
			}
		</style>
	</head>
	<body>
		<main>
			<img src="/favicon/android-icon-192x192.png" alt="" />
			<h1>Sparkle is offline</h1>
			<p>Your room needs the network for fresh media and chat. Reconnect and try again.</p>
			<button type="button" onclick="window.location.reload()">Retry</button>
		</main>
	</body>
</html>
